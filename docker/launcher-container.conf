# Launcher nginx config
# Serves the Flutter web SPA.
# Subpath routing to services is handled by nginx-proxy-manager
# at the your-domain.example.com entry point (see nginx-proxy-manager-advanced.conf.template).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
