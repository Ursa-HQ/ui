# Launcher nginx config — serves the Flutter SPA and proxies subpaths to services.
# nginx-proxy-manager points your-domain.example.com → launcher:80.
# All services are on the homeserver_media_network (internal Docker DNS).
# Subpath routes coexist with existing subdomain routes (jellyfin.mg3.net, etc.)
#
# All service location blocks strip X-Frame-Options to allow iframe embedding
# in the launcher shell.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── User Configuration ────────────────────────────────────
    # Replace nuc_host with the IP or hostname of your secondary machine
    # (e.g., a NUC running *arr stack, qBittorrent, etc.).
    # If all services run on the same host you can leave this as-is.
    set $nuc_host "nuc-host.local";
    # Docker DNS — resolves hostnames at request time so the launcher
    # doesn't crash when a container is stopped/absent
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Subpath Routing ────────────────────────────────────────

    # Jellyfin
    location /_p/jellyfin/ {
        proxy_pass http://jellyfin:8096/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://jellyfin:8096/ /_p/jellyfin/;
    }

    # Grafana
    # Uses serve_from_sub_path=true — nginx must NOT strip the /grafana/ prefix.
    # proxy_pass without trailing slash preserves the full URI path.
    location /_p/grafana/ {
        proxy_pass http://grafana:3000;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http://grafana:3000/grafana/ /_p/grafana/;
    }

    # AdGuard Home API catch-alls
    # AdGuard's JS constructs API paths (like /control/login) at runtime using
    # axios with dynamic baseURL — sub_filter can't rewrite these. These location
    # blocks catch the absolute API paths and proxy them to AdGuard.
    location ~ ^/(control|filter|dhcp|querylog|stats|access|install|setup|login\.html)(/|$) {
        proxy_pass http://adguardhome:80;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
    }

    # AdGuard Home
    # AdGuard doesn't support subpath natively — we use sub_filter to rewrite
    # redirects and asset paths so they flow through the /adguard/ prefix.
    # The JS bundle contains absolute API paths (/control/, /filter/, etc.)
    # that must be rewritten to /adguard/... to hit the correct nginx location.
    location /_p/adguard/ {
        proxy_pass http://adguardhome:80/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://adguardhome:80/ /_p/adguard/;
        proxy_redirect /login.html /_p/adguard/login.html;
        sub_filter_types text/css application/javascript;
        sub_filter '/login.' '/_p/adguard/login.';
        sub_filter '/assets/' '/adguard/assets/';
        sub_filter '/control/' '/_p/adguard/control/';
        sub_filter '/filter/' '/_p/adguard/filter/';
        sub_filter '/dhcp/' '/_p/adguard/dhcp/';
        sub_filter '/querylog/' '/_p/adguard/querylog/';
        sub_filter '/stats/' '/_p/adguard/stats/';
        sub_filter_once off;
    }

    # Dozzle
    location /_p/dozzle/ {
        proxy_pass http://dozzle:8080;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
    }

    # Portainer
    location /_p/portainer/ {
        proxy_pass http://portainer:9000/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://portainer:9000/ /_p/portainer/;
    }

    location /_p/trading/ {
        proxy_pass http://trading-engine:8085/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sweep Pairs Dashboard — dynamic upstream (container may be stopped)
    location /_p/sweep/ {
        set $sweep_upstream http://audcad-sweep:8086;
        rewrite ^/_p/sweep/(.*) /$1 break;
        proxy_pass $sweep_upstream;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fleet Dashboard — Hermes agent monitoring
    location /_p/fleet/ {
        proxy_pass http://fleet-dashboard:8088/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dukascopy Downloader — SPA + API from dukascopy-dl on 8087
    location /_p/dl/ {
        proxy_pass http://dukascopy-dl:8087/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── New Local Services ──────────────────────────────────────

    # Prometheus
    location /_p/prometheus/ {
        proxy_pass http://prometheus:9090;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://prometheus:9090/ /_p/prometheus/;
    }

    # cAdvisor
    location /_p/cadvisor/ {
        proxy_pass http://cadvisor:8080/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://cadvisor:8080/ /_p/cadvisor/;
    }

    location /_p/bookstack/ {
        proxy_pass http://bookstack:80/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://bookstack:80/ /_p/bookstack/;
    }

    location /_p/minio/ {
        proxy_pass http://minio:9001/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://minio:9001/ /_p/minio/;
    }

    # nginx-proxy-manager admin UI
    location /_p/npm/ {
        proxy_pass http://nginx-proxy-manager:81/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://nginx-proxy-manager:81/ /_p/npm/;
    }
    # Wiki — markdown wiki engine
    location /_p/wiki/ {
        proxy_pass http://wiki-server:3501/;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── NUC Media Services ─────────────────────────────────────
    # Services running on the NUC ($nuc_host).
    # Each service has its URL_BASE configured so subpath routing works.

    # Sonarr
    location /_p/sonarr/ {
        rewrite ^/_p/sonarr/(.*) /sonarr/$1 break;
        proxy_pass http://$nuc_host:8989;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://$nuc_host:8989/sonarr/ /_p/sonarr/;
        proxy_redirect /login _p/sonarr/login;
    }

    # Radarr
    location /_p/radarr/ {
        rewrite ^/_p/radarr/(.*) /radarr/$1 break;
        proxy_pass http://$nuc_host:7878;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://$nuc_host:7878/radarr/ /_p/radarr/;
        proxy_redirect /login _p/radarr/login;
    }

    # Prowlarr
    location /_p/prowlarr/ {
        rewrite ^/_p/prowlarr/(.*) /prowlarr/$1 break;
        proxy_pass http://$nuc_host:9696;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://$nuc_host:9696/prowlarr/ /_p/prowlarr/;
        proxy_redirect /login _p/prowlarr/login;
    }

    # Bazarr
    location /_p/bazarr/ {
        rewrite ^/_p/bazarr/(.*) /bazarr/$1 break;
        proxy_pass http://$nuc_host:6767;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://$nuc_host:6767/bazarr/ /_p/bazarr/;
    }

    # SABnzbd
    location /_p/sabnzbd/ {
        proxy_pass http://$nuc_host:3202;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://$nuc_host:3202/ /_p/sabnzbd/;
    }

    # Jellyseerr
    location /_p/jellyseerr/ {
        rewrite ^/_p/jellyseerr/(.*) /jellyseerr/$1 break;
        proxy_pass http://$nuc_host:5055;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://$nuc_host:5055/jellyseerr/ /_p/jellyseerr/;
    }

    # qBittorrent (behind gluetun on NUC, port 3216)
    # Note: qBittorrent validates the Host header — must match the upstream address
    location /_p/qbittorrent/ {
        rewrite ^/_p/qbittorrent/(.*) /$1 break;
        proxy_pass http://$nuc_host:3216;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $nuc_host:3216;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_redirect http://$nuc_host:3216/ /_p/qbittorrent/;
    }

    # Flutter SPA — catch-all, must be last
    # Exact match for root to prevent regex locations from intercepting
    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
